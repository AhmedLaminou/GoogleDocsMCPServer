name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Compile and test
        run: |
          python -m compileall google_docs_mcp_server
          python -m unittest discover -s tests -v

      - name: Verify tool registry
        run: |
          python -c "from google_docs_mcp_server.registry import TOOL_FUNCTIONS; assert len(TOOL_FUNCTIONS) == 100; assert len({f.__name__ for f in TOOL_FUNCTIONS}) == 100"

  package:
    name: Build Python distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and inspect
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
          if tar -tf dist/*.tar.gz | grep -E '(^|/)(token\.json|credentials\.json)$'; then
            echo "A private credential artifact was packaged."
            exit 1
          fi
          if unzip -l dist/*.whl | grep -E '(^|/)(token\.json|credentials\.json)$'; then
            echo "A private credential artifact was packaged."
            exit 1
          fi

  vscode-extension:
    name: VS Code extension
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install, audit, compile, and package
        working-directory: vscode-extension
        run: |
          npm ci
          npm audit --audit-level=moderate
          npm run compile
          npm run package
